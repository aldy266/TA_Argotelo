<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Kasir | Argotelo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #f6f2ed; color: #2d2118; }
        .pos-shell { display: grid; grid-template-columns: minmax(0, 1fr) 360px; min-height: 100vh; }
        .catalog { padding: 24px; }
        .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 20px; }
        .search { width: min(420px, 100%); padding: 12px 14px; border: 1px solid #ddd2c7; border-radius: 8px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }
        .menu-card { background: #fff; border: 1px solid #eadfd3; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; min-height: 220px; }
        .menu-card img, .menu-placeholder { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; background: #efe7dc; display: grid; place-items: center; color: #7b6048; }
        .menu-body { padding: 12px; display: grid; gap: 8px; flex: 1; }
        .menu-body h3 { font-size: 16px; margin: 0; }
        .menu-body span { color: #7b6048; font-size: 13px; }
        .menu-body button, .checkout-btn, .secondary-btn, .qty-btn, .remove-btn { border: 0; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .menu-body button, .checkout-btn { background: #5a3718; color: #fff; padding: 10px; }
        .cart { background: #fff; border-left: 1px solid #eadfd3; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .cart-list { display: grid; gap: 10px; overflow: auto; max-height: 48vh; }
        .cart-item { border: 1px solid #eadfd3; border-radius: 8px; padding: 10px; display: grid; gap: 8px; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .qty-group { display: flex; gap: 6px; align-items: center; }
        .qty-btn { width: 28px; height: 28px; background: #efe7dc; }
        .remove-btn { background: #f4d7d7; color: #8a2525; padding: 7px 10px; }
        .totals { border-top: 1px solid #eadfd3; padding-top: 12px; display: grid; gap: 8px; }
        .payment { padding: 10px; border: 1px solid #ddd2c7; border-radius: 8px; }
        .secondary-btn { background: #efe7dc; padding: 10px; }
        .empty { color: #7b6048; text-align: center; padding: 24px; }
        @media (max-width: 900px) { .pos-shell { grid-template-columns: 1fr; } .cart { border-left: 0; border-top: 1px solid #eadfd3; } }
    </style>
</head>

<body>
    <main class="pos-shell">
        <section class="catalog">
            <div class="topbar">
                <div>
                    <h1>POS Argotelo</h1>
                    <p id="cashierName">Memuat kasir...</p>
                </div>
                <input class="search" id="menuSearch" type="search" placeholder="Cari menu atau kategori...">
            </div>
            <div class="menu-grid" id="menuGrid">
                <div class="empty">Memuat menu...</div>
            </div>
        </section>

        <aside class="cart">
            <h2>Keranjang</h2>
            <div class="cart-list" id="cartList">
                <div class="empty">Keranjang masih kosong.</div>
            </div>
            <select class="payment" id="paymentMethod">
                <option value="">Pilih pembayaran</option>
                <option value="CASH">Cash</option>
                <option value="QRIS">QRIS</option>
                <option value="DEBIT">Debit</option>
            </select>
            <input class="payment" id="customerName" type="text" placeholder="Nama pelanggan (opsional)">
            <div class="totals">
                <div class="cart-row"><span>Subtotal</span><strong id="subtotal">Rp 0</strong></div>
                <div class="cart-row"><span>Pajak</span><strong id="tax">Rp 0</strong></div>
                <div class="cart-row"><span>Total preview</span><strong id="total">Rp 0</strong></div>
            </div>
            <button class="checkout-btn" id="checkoutBtn" type="button">Checkout</button>
            <button class="secondary-btn" id="resetCartBtn" type="button">Reset Cart</button>
            <button class="secondary-btn" id="logoutBtn" type="button">Logout</button>
            <p id="checkoutMessage"></p>
        </aside>
    </main>

    <script src="{{ url_for('static', filename='js/cashier_pos.js') }}"></script>
</body>

</html>
