<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<title>
Absensi | Argotelo
</title>


<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


<link rel="stylesheet"
href="{{ url_for('static', filename='css/cashier_attendance.css') }}">


</head>


<body>


<main class="pos-page">


<!-- ================= SIDEBAR ================= -->

<aside class="sidebar">


<h1 class="brand">
ARGOTELO SALATIGA
</h1>


<nav class="nav">


<a href="{{ url_for('cashier.pos') }}">

<i class="bi bi-cash-register"></i>

<span>
POS System
</span>

</a>



<a href="{{ url_for('cashier.inventory') }}">

<i class="bi bi-archive"></i>

<span>
Inventory
</span>

</a>




<a href="{{ url_for('cashier.transaction') }}">

<i class="bi bi-receipt"></i>

<span>
Riwayat Transaksi
</span>

</a>




<a href="{{ url_for('cashier.attendance') }}"
class="active">

<i class="bi bi-calendar-check"></i>

<span>
Absensi
</span>

</a>


</nav>




<div class="sidebar-footer">


<button id="logoutBtn">

<i class="bi bi-box-arrow-right"></i>

<span>
Sign Out
</span>

</button>


</div>



</aside>





<!-- ================= CONTENT ================= -->


<section class="attendance-page">



<div class="attendance-card">



<div class="attendance-header">


<div>

<h1>
Absensi Karyawan
</h1>


<p id="today">
-
</p>


</div>


<div class="header-icon">

<i class="bi bi-calendar-check"></i>

</div>


</div>





<!-- PILIH KARYAWAN -->


<div class="form-group">


<label>

Nama Karyawan

</label>



<div class="employee-select">



<div class="select-box"
id="employeeBox">


<span id="selectedEmployee">

Pilih Karyawan

</span>


<i class="bi bi-chevron-down"></i>


</div>





<div class="employee-dropdown"
id="employeeDropdown">


<div class="search-employee">


<i class="bi bi-search"></i>


<input
type="text"
id="employeeSearch"
placeholder="Cari karyawan...">


</div>



<div id="employeeList">


</div>



</div>




<input
type="hidden"
id="staffSelect">



</div>


</div>







<!-- PIN -->


<div class="form-group">


<label>

PIN Absensi

</label>


<input
id="pinInput"
type="password"
placeholder="Masukkan PIN Absensi">


</div>







<!-- BUTTON -->


<div class="action">


<button id="checkInBtn"
class="btn-in">


<i class="bi bi-box-arrow-in-right"></i>

Absen Masuk


</button>




<button id="checkOutBtn"
class="btn-out">


<i class="bi bi-box-arrow-left"></i>

Absen Pulang


</button>



</div>






<!-- STATUS -->


<div class="today-status">


<h3>

Status Hari Ini

</h3>



<div class="status-row">


<span>

🟢 Masuk

</span>


<b id="timeIn">

-

</b>



</div>





<div class="status-row">


<span>

🔴 Pulang

</span>


<b id="timeOut">

-

</b>


</div>



</div>





<p id="message">

</p>




</div>



</section>




</main>






<script src="{{ url_for('static',
filename='js/cashier_attendance.js') }}">
</script>



</body>


</html>
