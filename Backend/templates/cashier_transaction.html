<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<title>Riwayat Transaksi | Argotelo</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/cashier_transaction.css') }}">

</head>


<body>


<div class="wrapper">


<!-- SIDEBAR -->
<aside class="sidebar">


<div class="sidebar-logo">

<h2>ARGOTELO<br>SALATIGA</h2>

</div>


<nav class="sidebar-menu">


<a href="{{ url_for('cashier.pos') }}">

<i class="bi bi-cash-register"></i>

<span>POS System</span>

</a>


<a href="{{ url_for('cashier.inventory') }}">

<i class="bi bi-box"></i>

<span>Inventory</span>

</a>


<a href="{{ url_for('cashier.transaction') }}"
class="active">

<i class="bi bi-receipt"></i>

<span>Riwayat Transaksi</span>

</a>

<a href="{{ url_for('cashier.attendance') }}"><i class="bi bi-receipt"></i><span>Absensi</span></a>


</nav>


</aside>





<!-- MAIN -->
<main class="main-content">


<header class="topbar">


<div class="search-box">

<i class="bi bi-search"></i>

<input 
id="transactionSearch"
placeholder="Cari transaksi...">

</div>


<div class="profile">

<div class="profile-info">

<h4 id="cashierName">Kasir</h4>

<span>KASIR</span>

</div>


<img id="profileImage"
src="/static/images/profile.png">


</div>


</header>





<div class="page-header">


<div class="page-title">

<h1>Riwayat Transaksi</h1>

<p>Daftar transaksi yang dilakukan kasir.</p>

</div>


</div>





<div class="transaction-card">


<div class="table-responsive">


<table class="transaction-table">


<thead>

<tr>

<th>No Transaksi</th>

<th>Tanggal</th>

<th>Pelanggan</th>

<th>Pembayaran</th>

<th>Total</th>

<th>Aksi</th>

</tr>

</thead>



<tbody id="transactionTable">


<tr>

<td colspan="6">

Memuat transaksi...

</td>

</tr>


</tbody>


</table>


</div>


</div>



</main>


</div>


<script src="{{ url_for('static', filename='js/cashier_transaction.js') }}"></script>


</body>

</html>
