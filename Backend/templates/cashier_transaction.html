<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Transaksi | Argotelo</title>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/cashier_transaction.css') }}">
</head>

<body>

<div class="page">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <h1 class="brand">
            ARGOTELO SALATIGA
        </h1>

        <nav class="nav">

            <a href="{{ url_for('cashier.pos') }}">
                <i class="bi bi-cash-register"></i>
                <span>POS System</span>
            </a>


            <a href="{{ url_for('cashier.inventory') }}">
                <i class="bi bi-archive"></i>
                <span>Inventory</span>
            </a>


            <a href="{{ url_for('cashier.transaction') }}"
               class="active">

                <i class="bi bi-receipt"></i>
                <span>Riwayat Transaksi</span>

            </a>

        </nav>

    </aside>


    <!-- MAIN -->
    <main>


        <!-- TOPBAR -->
        <header class="topbar">

            <div class="search-box">

                <i class="bi bi-search"></i>

                <input
                    id="transactionSearch"
                    type="search"
                    placeholder="Cari transaksi...">

            </div>


            <div class="profile">

                <div>

                    <h4 id="cashierName">
                        Memuat...
                    </h4>

                    <span>
                        KASIR
                    </span>

                </div>


                <img
                    id="profileImage"
                    src="{{ url_for('static',
                    filename='images/profile.png') }}">

            </div>

        </header>



        <!-- CONTENT -->
        <section class="content">


            <div class="header">

                <div>

                    <h1>
                        Riwayat Transaksi
                    </h1>

                    <p>
                        Daftar transaksi yang dilakukan oleh kasir.
                    </p>

                </div>

            </div>



            <!-- CARD -->
            <div class="table-card">


                <table>


                    <thead>

                    <tr>

                        <th>No Transaksi</th>

                        <th>Tanggal</th>

                        <th>Pelanggan</th>

                        <th>Pembayaran</th>

                        <th>Total</th>

                        <th>Aksi</th>

                    </tr>

                    </thead>



                    <tbody id="transactionTable">

                        <tr>

                            <td colspan="6"
                                class="empty">

                                Memuat transaksi...

                            </td>

                        </tr>

                    </tbody>


                </table>


            </div>


        </section>


    </main>


</div>


<script src="{{ url_for('static',
filename='js/cashier_transaction.js') }}"></script>


</body>

</html>
