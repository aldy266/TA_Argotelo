<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Reset Password | AMSP
    </title>


    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/auth.css') }}">


</head>


<body class="login-page">


<div class="auth-container">

    <div class="login-shell">

<div class="auth-card login-card">


    <!-- LOGO -->
    <div class="logo-container">

        <img
        src="{{ url_for('static',
        filename='images/logo RB.png') }}"
        class="logo">

    </div>



    <div class="auth-header">


        <h1>
            RESET PASSWORD
        </h1>


        <p>
            Buat password baru akun AMSP anda
        </p>


    </div>



    <form
    class="auth-form"
    id="resetPasswordForm">



        <input
        type="hidden"
        id="token"
        value="{{token}}">



        <div class="form-group">


            <label>
                PASSWORD BARU
            </label>


            <div class="input-group password-wrapper">


                <i class="bi bi-lock"></i>


                <input
                type="password"
                id="password"
                placeholder="Masukkan password baru"
                required>


            </div>


        </div>




        <button
        type="submit"
        class="btn-login">


            Simpan Password
            <i class="bi bi-arrow-right"></i>


        </button>


        <a href="/"
        class="btn-register">

            Back Login

        </a>



    </form>



</div>

    </div>


</div>



<script src="{{ url_for('static',
filename='js/auth.js') }}"></script>


</body>


</html>
