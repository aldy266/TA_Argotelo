<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi | Argotelo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/employee_attendance.css') }}">
</head>

<body>
    <main class="attendance-shell">
        <section class="attendance-card">
            <header class="attendance-header">
                <div>
                    <span class="eyebrow">Absensi Pribadi</span>
                    <h1>Absensi Karyawan</h1>
                    <p id="todayLabel">Memuat tanggal...</p>
                </div>
                <img src="{{ url_for('static', filename='images/logo RB.png') }}" alt="Argotelo">
            </header>

            <div class="employee-panel">
                <div>
                    <small>Nama</small>
                    <strong id="staffName">Memuat...</strong>
                </div>
                <div>
                    <small>Jabatan</small>
                    <strong id="staffPosition">-</strong>
                </div>
            </div>

            <div class="shift-panel">
                <div>
                    <small>Shift Hari Ini</small>
                    <strong id="shiftName">-</strong>
                </div>
                <div>
                    <small>Jam Kerja</small>
                    <strong id="shiftTime">-</strong>
                </div>
            </div>

            <div class="action">
                <button id="clockInBtn" class="btn-in" type="button">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Absen Masuk
                </button>
                <button id="clockOutBtn" class="btn-out" type="button">
                    <i class="bi bi-box-arrow-left"></i>
                    Absen Pulang
                </button>
            </div>

            <div class="today-status">
                <h3>Status Hari Ini</h3>
                <div class="status-row">
                    <span><i class="bi bi-circle-fill status-dot in"></i>Masuk</span>
                    <b id="timeIn">-</b>
                </div>
                <div class="status-row">
                    <span><i class="bi bi-circle-fill status-dot out"></i>Pulang</span>
                    <b id="timeOut">-</b>
                </div>
                <div class="status-row">
                    <span><i class="bi bi-hourglass-split status-dot work"></i>Jam Kerja</span>
                    <b id="workDuration">00h 00m</b>
                </div>
            </div>

            <p id="message" role="status"></p>

            <button id="logoutBtn" class="logout-btn" type="button">
                <i class="bi bi-box-arrow-right"></i>
                Sign Out
            </button>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/employee_attendance.js') }}?v=20260712-1"></script>
</body>

</html>
